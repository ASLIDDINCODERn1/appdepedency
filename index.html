<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korpus NLP Analizatori</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="toastContainer" class="toast-container"></div>

    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox" title="Tungi/Kunduzgi rejim">
            <input type="checkbox" id="checkbox" />
            <div class="slider round">
                <i class="fas fa-sun"></i>
                <i class="fas fa-moon"></i>
            </div>
        </label>
    </div>

    <div class="container">
        
        <header class="header">
            <div class="logo">
                <i class="fas fa-brain"></i>
            </div>
            <h1>Korpus NLP Analizatori</h1>
            <p>Ma'lumotlar bazasi va qoidalar asosida avtomatik morfologik tahlil moduli</p>
        </header>
        
        <div class="main-card">
            <div class="input-wrapper">
                <label for="wordInput" style="display: block; margin-bottom: 10px; font-weight: 600;">Matn yoki gap kiriting:</label>
                <div class="textarea-container">
                    <i class="fas fa-paragraph input-icon"></i>
                    <textarea id="wordInput" placeholder="Masalan: Ushbu kitobni sotib olishim kerak..." rows="4"></textarea>
                </div>
            </div>
            
            <button class="btn-primary" id="analyzeBtn">
                <span id="btnText">Tahlil qilish</span> 
                <i class="fas fa-spinner fa-spin" id="btnSpinner" style="display: none;"></i>
            </button>
        </div>

        <div class="result-section" id="resultSection" style="display: none;">
            
            <div class="result-toolbar">
                <h3>Tahlil Natijalari</h3>
                <div class="action-buttons">
                    <button class="btn-outline" id="copyBtn">
                        <i class="far fa-copy"></i> Nusxalash
                    </button>
                    <button class="btn-outline-success" id="exportXlsxBtn">
                        <i class="fas fa-file-excel"></i> XLSX Yuklab olish
                    </button>
                </div>
            </div>
            
            <div class="results-grid" id="resultsGrid">
                </div>
            
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
